name: runtimez-deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Prerequisites on GitHub-hosted ubuntu runners.
      - uses: docker/setup-buildx-action@v3
      - uses: buildpacks/github-actions/setup-pack@v5.8.11
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
      - uses: SonarSource/sonarqube-scan-action@v4  # provides sonar-scanner on PATH

      - name: Build, test, scan, push and report to runtimez
        uses: runtimez/runtimez-deploy-action@v1
        with:
          runtimez-url: https://app.runtimez.io
          token: ${{ secrets.RUNTIMEZ_CI_TOKEN }}
          registry-host: ghcr.io
          image-repo: ${{ github.repository }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          # dockerfile-path: ""            # omit => Cloud Native Buildpacks
          sonar-host: https://sonar.runtimez.io
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          sonar-project-key: my-org_my-app
